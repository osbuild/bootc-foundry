name: RHEL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FOUNDRY_IMAGE: ghcr.io/${{ github.repository }}/foundry:${{ github.sha }}

jobs:
  build-container:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y podman

      - name: Log in to registry.redhat.io
        env:
          RHSM_USERNAME: ${{ secrets.RHSM_USERNAME }}
          RHSM_PASSWORD: ${{ secrets.RHSM_PASSWORD }}
        run: |
          echo "$RHSM_PASSWORD" | podman login -u "$RHSM_USERNAME" --password-stdin registry.redhat.io

      - name: Build foundry image
        run: |
          podman build -f Containerfile.foundry -t "$FOUNDRY_IMAGE" .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Push foundry image
        run: podman push "$FOUNDRY_IMAGE"

  run-matrix:
    name: build-rhel-${{ matrix.rhel }}
    runs-on: ubuntu-latest
    needs: build-container
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel: "9"
            script: matrix-rhel9.sh
            image_tag: rhel-bootc:9
            from_image: registry.redhat.io/rhel9/rhel-bootc
            from_tag: "9.7"
          - rhel: "10"
            script: matrix-rhel10.sh
            image_tag: rhel-bootc:10
            from_image: registry.redhat.io/rhel10/rhel-bootc
            from_tag: "10.1"
    steps:
      - name: Install Podman
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y podman

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Pull foundry image
        run: podman pull "${{ env.FOUNDRY_IMAGE }}"

      - name: Cache base image
        uses: actions/cache@v4
        with:
          path: skopeo-cache-rhel-${{ matrix.rhel }}
          key: skopeo-rhel-${{ matrix.rhel }}-${{ matrix.from_tag }}

      - name: Register RHSM and run matrix build
        env:
          RHSM_ORG: ${{ secrets.RHSM_ORG }}
          RHSM_ACTIVATIONKEY: ${{ secrets.RHSM_ACTIVATIONKEY }}
          RHSM_USERNAME: ${{ secrets.RHSM_USERNAME }}
          RHSM_PASSWORD: ${{ secrets.RHSM_PASSWORD }}
          CACHE_ARCHIVE: /cache/base-${{ matrix.from_tag }}.tar
          STORAGE_DRIVER: overlay
          STORAGE_OPTS: "overlay.mount_program=/usr/bin/fuse-overlayfs"
          BUILDAH_ISOLATION: chroot
        run: |
          mkdir -p skopeo-cache-rhel-${{ matrix.rhel }}
          chmod 777 skopeo-cache-rhel-${{ matrix.rhel }}
          podman run --rm --privileged --cap-add SYS_ADMIN \
            -v /dev:/dev:rw -v /sys:/sys:rw --device /dev/fuse:rw \
            --security-opt label=disable --security-opt seccomp=unconfined \
            -v "${{ github.workspace }}/skopeo-cache-rhel-${{ matrix.rhel }}:/cache:rw" \
            -e RHSM_ORG -e RHSM_ACTIVATIONKEY -e RHSM_USERNAME -e RHSM_PASSWORD \
            -e CACHE_ARCHIVE -e STORAGE_DRIVER -e STORAGE_OPTS -e BUILDAH_ISOLATION \
            "${{ env.FOUNDRY_IMAGE }}" \
            sh -c '
              set -e
              trap "e=\$?; subscription-manager unregister || true; exit \$e" EXIT
              subscription-manager register --org "$RHSM_ORG" --activationkey "$RHSM_ACTIVATIONKEY" || true
              echo "$RHSM_PASSWORD" | buildah login -u "$RHSM_USERNAME" --password-stdin registry.redhat.io
              ./${{ matrix.script }} ${{ matrix.image_tag }}
            '
          sudo chown -R "$USER" skopeo-cache-rhel-${{ matrix.rhel }}
